<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Rim -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#334155" stroke-width="4"/>
  <!-- Spinning group using SMIL animateTransform -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 100 100" to="360 100 100" dur="2.5s" repeatCount="indefinite"/>
    <!-- Spokes -->
    <line x1="100" y1="100" x2="100" y2="18" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="176" y2="56" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="176" y2="144" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="100" y2="182" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="24" y2="144" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="24" y2="56" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Carbon fiber bars -->
    <rect x="97.5" y="18" width="5" height="82" rx="2" fill="#1e293b" opacity="0.8"/>
    <rect x="97.5" y="100" width="5" height="82" rx="2" fill="#1e293b" opacity="0.8"/>
    <!-- Arm 1 LEDs -->
    <circle cx="101" cy="78" r="4.5" fill="#f43f5e"/>
    <circle cx="101" cy="62" r="4.5" fill="#fb923c"/>
    <circle cx="101" cy="46" r="4.5" fill="#facc15"/>
    <circle cx="101" cy="30" r="4.5" fill="#4ade80"/>
    <!-- Arm 1 opposite face LEDs -->
    <circle cx="99" cy="78" r="4.5" fill="#06b6d4"/>
    <circle cx="99" cy="62" r="4.5" fill="#818cf8"/>
    <circle cx="99" cy="46" r="4.5" fill="#f43f5e"/>
    <circle cx="99" cy="30" r="4.5" fill="#fb923c"/>
    <!-- Arm 2 LEDs -->
    <circle cx="101" cy="122" r="4.5" fill="#facc15"/>
    <circle cx="101" cy="138" r="4.5" fill="#4ade80"/>
    <circle cx="101" cy="154" r="4.5" fill="#06b6d4"/>
    <circle cx="101" cy="170" r="4.5" fill="#818cf8"/>
    <!-- Arm 2 opposite face LEDs -->
    <circle cx="99" cy="122" r="4.5" fill="#f43f5e"/>
    <circle cx="99" cy="138" r="4.5" fill="#fb923c"/>
    <circle cx="99" cy="154" r="4.5" fill="#facc15"/>
    <circle cx="99" cy="170" r="4.5" fill="#4ade80"/>
  </g>
  <!-- Hub on top -->
  <circle cx="100" cy="100" r="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
</svg>
